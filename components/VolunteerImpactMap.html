<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volunteer Impact Map</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f7f7f7; margin: 0; }
    .impact-map-container { max-width: 900px; margin: 40px auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 8px #0001; padding: 32px; }
    h1 { text-align: center; margin-bottom: 24px; }
    .map-placeholder { width: 100%; height: 400px; background: #e0e0e0; border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #888; font-size: 1.3em; margin-bottom: 24px; }
    .legend { margin-top: 24px; }
    .legend span { display: inline-block; width: 16px; height: 16px; border-radius: 50%; margin-right: 8px; vertical-align: middle; }
    .legend-item { margin-right: 18px; display: inline-block; }
  </style>
</head>
<body>
  <div class="impact-map-container">
    <h1>Volunteer Impact Map</h1>
    <div class="map-placeholder">
      [Google Map would appear here]
    </div>
    <div class="legend">
      <div class="legend-item"><span style="background:#1976d2;"></span>Active Project</div>
      <div class="legend-item"><span style="background:#43a047;"></span>Completed Project</div>
      <div class="legend-item"><span style="background:#fbc02d;"></span>Planned Project</div>
    </div>
  </div>
</body>
</html>
